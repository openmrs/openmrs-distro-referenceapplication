worker_processes  auto;
user              nobody;

events {
  worker_connections  1024;
  multi_accept        off;
}

http {
  include       mime.types;
  default_type  application/octet-stream;
  tcp_nopush    on;
  tcp_nodelay   on;
  sendfile      on;
  server_tokens off;

  gzip            on;
  gzip_comp_level 4;
  gzip_types      text/plain text/css application/javascript application/json image/svg+xml;

  keepalive_timeout  65;

  server {
    listen  80;
    root    /usr/share/nginx/html;
    index   index.html;

    # PWA: service worker must never be cached by the browser
    location ~* service-worker\.js$ {
      add_header Cache-Control "no-store, no-cache, must-revalidate";
      add_header X-Content-Type-Options nosniff;
      expires -1d;
      try_files $uri =404;
    }

    # PWA manifest: revalidate on each load so updates are picked up
    location ~* manifest\.json$ {
      add_header Cache-Control "no-cache, must-revalidate";
      try_files $uri =404;
    }

    location ~* (\.js|openmrs\.(\w*\.)?css)$ {
      expires 1y;
      try_files $uri =404;
    }

    # handle anything with a "." that's not an HTML file
    # assume it's a static file
    location ~* \.(?!html?)[^.]+$ {
      add_header Cache-Control "no-cache, must-revalidate";
      try_files $uri =404;
    }

    # any other URL should serve the single page
    location / {
      add_header Cache-Control "no-cache, must-revalidate";
      try_files /index.html =404;
    }
  }
}