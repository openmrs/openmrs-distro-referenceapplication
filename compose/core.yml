# Core services: gateway, frontend-init, backend, db

services:
  gateway:
    container_name: sihsalus-gateway
    build:
      context: ./gateway
    restart: "unless-stopped"
    depends_on:
      frontend-init:
        condition: service_completed_successfully
      backend:
        condition: service_healthy
    ports:
      - "127.0.0.1:8081:80"
    volumes:
      - spa-data:/spa:ro
    environment:
      FRAME_ANCESTORS: ${FRAME_ANCESTORS:-}
      FUA_CONFIG: ${FUA_CONFIG:-}
      FUA_LOCATIONS: ${FUA_LOCATIONS:-}
    healthcheck:
      test: [ "CMD", "wget", "-q", "-O", "/dev/null", "http://localhost/" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  frontend-init:
    container_name: sihsalus-frontend-init
    image: ghcr.io/sihsalus/sihsalus-frontend:${FRONTEND_TAG:-latest}
    user: "0"
    volumes:
      - spa-data:/spa
    environment:
      SPA_PATH: /openmrs/spa
      API_URL: /openmrs
      SPA_CONFIG_URLS: /openmrs/spa/frontend.json
      SPA_DEFAULT_LOCALE: es
      SPA_OUTPUT_DIR: /spa
    restart: "no"

  backend:
    container_name: sihsalus-backend
    image: ghcr.io/sihsalus/sihsalus-backend:${BACKEND_TAG:-latest}
    build:
      context: .
      dockerfile: backend/Dockerfile
      secrets:
        - GHP_USERNAME
        - GHP_PASSWORD
    restart: "unless-stopped"
    depends_on:
      db:
        condition: service_healthy
    environment:
      OMRS_CONFIG_MODULE_WEB_ADMIN: "false"
      OMRS_CONFIG_AUTO_UPDATE_DATABASE: "true"
      OMRS_CONFIG_CREATE_TABLES: "true"
      OMRS_CONFIG_CONNECTION_SERVER: db
      OMRS_CONFIG_CONNECTION_DATABASE: openmrs
      OMRS_CONFIG_CONNECTION_USERNAME: ${OPENMRS_DB_USER:-openmrs}
      OMRS_CONFIG_CONNECTION_PASSWORD: ${MYSQL_OPENMRS_PASSWORD:-openmrs}
      OMRS_OCL_TOKEN: ${OMRS_OCL_TOKEN}
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/openmrs/health/started" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 3600s
    volumes:
      - openmrs-data:/openmrs/data

  db:
    container_name: sihsalus-db-master
    image: mariadb:10.11.7
    restart: "unless-stopped"
    command: "mariadbd --character-set-server=utf8mb4 --collation-server=utf8mb4_general_ci --server-id=1 --log-bin=mysql-bin --binlog-format=ROW --sync-binlog=1 --log-slave-updates=1"
    healthcheck:
      test: [ "CMD-SHELL", "mariadb --user=${OMRS_DB_USER:-openmrs} --password=${MYSQL_OPENMRS_PASSWORD:-openmrs} --execute 'SHOW DATABASES;'" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    environment:
      MYSQL_DATABASE: openmrs
      MYSQL_USER: ${OMRS_DB_USER:-openmrs}
      MYSQL_PASSWORD: ${MYSQL_OPENMRS_PASSWORD:-openmrs}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      OMRS_DB_REPL_USER: ${OMRS_DB_REPL_USER:-openmrs_repl}
      OMRS_DB_REPL_PASSWORD: ${OMRS_DB_REPL_PASSWORD}
      OMRS_DB_BACKUP_USER: ${OMRS_DB_BACKUP_USER:-openmrs_backup}
      OMRS_DB_BACKUP_PASSWORD: ${OMRS_DB_BACKUP_PASSWORD}
    volumes:
      - ./scripts/database/db_init_master.sh:/docker-entrypoint-initdb.d/db_init_master.sh
      - db-data:/var/lib/mysql
      - db-backup:/backup

secrets:
  GHP_USERNAME:
    environment: GHP_USERNAME
  GHP_PASSWORD:
    environment: GHP_PASSWORD
