# Medical Imaging Stack (DICOM/OHIF/Orthanc)
# Profile: imaging

services:
  ohif:
    container_name: peruHCE-ohif
    image: ohif/app:v3.9.3
    restart: "unless-stopped"
    profiles: [ imaging ]
    ports:
      - "3000:80"
    volumes:
      - ./imaging/app-config.js:/usr/share/nginx/html/app-config.js:ro
    depends_on:
      - orthanc
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost/" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - dicom-network
      - default

  orthanc:
    container_name: peruHCE-orthanc
    image: orthancteam/orthanc:25.8.2
    restart: "unless-stopped"
    profiles: [ imaging ]
    ports:
      - "8042:8042"
      - "4242:4242"
    environment:
      ORTHANC_JSON: |
        {
          "Name": "PeruHCE Orthanc",
          "HttpServer": {
            "ExternalRoot": "http://localhost:8043"
          },
          "RemoteAccessAllowed": true,
          "AuthenticationEnabled": false,
          "RegisteredUsers": {},
          "DicomAet": "ORTHANC",
          "DicomPort": 4242,
          "DicomWeb": {
            "Enable": true,
            "Root": "/dicom-web/",
            "EnableWado": true,
            "WadoRoot": "/wado",
            "Ssl": false
          },
          "StableAge": 60,
          "StrictAetComparison": false,
          "HttpTimeout": 60,
          "ConcurrentJobs": 2
        }
    volumes:
      - orthanc-data:/var/lib/orthanc/db
    healthcheck:
      test: [ "CMD-SHELL", "python3 -c 'import http.client; conn = http.client.HTTPConnection(\"localhost\", 8042); conn.request(\"GET\", \"/system\"); res = conn.getresponse(); exit(0 if res.status == 200 else 1)'" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - dicom-network
      - default

  orthanc-proxy:
    container_name: peruHCE-orthanc-proxy
    image: nginx:1.25-alpine
    restart: "unless-stopped"
    profiles: [ imaging ]
    ports:
      - "8043:80"
    volumes:
      - ./gateway/orthanc-proxy.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - orthanc
    networks:
      - default
