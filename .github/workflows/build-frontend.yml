name: Build Frontend

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/build-frontend.yml'
      - 'frontend/**'
  workflow_dispatch:
    inputs:
      docker_image_tag:
        description: 'Docker image tag (e.g., nightly)'
        required: false
        default: 'nightly'
      docker_image_tag_version:
        description: 'Docker image version tag (e.g., 3.7.x)'
        required: false
        default: '3.7.x'
      docker_image_tag_env:
        description: 'Docker image environment tag (e.g., dev3)'
        required: false
        default: 'dev3'

env:
  IMAGE: openmrs/openmrs-reference-application-3-frontend
  DOCKER_IMAGE_TAG: ${{ github.event.inputs.docker_image_tag || 'nightly' }}
  DOCKER_IMAGE_TAG_VERSION: ${{ github.event.inputs.docker_image_tag_version || '3.7.x' }}
  DOCKER_IMAGE_TAG_ENV: ${{ github.event.inputs.docker_image_tag_env || 'dev3' }}
  DOCKER_IMAGE_PLATFORMS: linux/amd64,linux/arm64

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-publish:
    name: Build and Publish the Frontend Image
    if: github.repository_owner == 'openmrs'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Log in to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build and push Docker image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: ./frontend
          push: true
          platforms: ${{ env.DOCKER_IMAGE_PLATFORMS }}
          build-args: |
            CACHE_BUST=${{ github.run_id }}
          tags: |
            ${{ env.IMAGE }}:${{ env.DOCKER_IMAGE_TAG }}
            ${{ env.IMAGE }}:${{ env.DOCKER_IMAGE_TAG_VERSION }}
            ${{ env.IMAGE }}:${{ env.DOCKER_IMAGE_TAG_ENV }}

  extract-and-deploy:
    name: Extract config and Deploy to Maven
    runs-on: ubuntu-latest
    needs: build-and-publish
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Extract spa-assemble-config.json
        run: |
          IMAGE="${{ env.IMAGE }}:${{ env.DOCKER_IMAGE_TAG }}"
          CONTAINER_ID=$(docker create $IMAGE)
          docker cp $CONTAINER_ID:/usr/share/nginx/html/spa-assemble-config.json ./frontend/src/main/resources/spa-assemble-config.json
          docker rm $CONTAINER_ID

      - name: Set up Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: '21'

      - name: Create Maven settings.xml
        run: |
          mkdir -p "$HOME/.m2"
          cat > "$HOME/.m2/settings.xml" << EOF
          <settings>
            <servers>
              <server>
                <id>openmrs-repo-releases</id>
                <username>${MAVEN_REPO_USERNAME}</username>
                <password>${MAVEN_REPO_API_KEY}</password>
              </server>
              <server>
                <id>openmrs-repo-snapshots</id>
                <username>${MAVEN_REPO_USERNAME}</username>
                <password>${MAVEN_REPO_API_KEY}</password>
              </server>
            </servers>
          </settings>
          EOF
        env:
          MAVEN_REPO_USERNAME: ${{ secrets.MAVEN_REPO_USERNAME }}
          MAVEN_REPO_API_KEY: ${{ secrets.MAVEN_REPO_API_KEY }}

      - name: Deploy frontend artifact
        run: mvn deploy -Pfrontend -pl frontend -s $HOME/.m2/settings.xml -B
