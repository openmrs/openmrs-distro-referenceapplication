name: Deploy to Dev3

on:
  workflow_run:
    workflows:
      - Build Backend
      - Build Certbot
      - Build Frontend
      - Build Gateway
      - Build Monitoring-init
    branches: [main]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Dev3
    runs-on: ubuntu-latest
    if: ${{ github.repository_owner == 'openmrs' && (github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success') }}
    environment:
      name: dev3
      url: https://dev3.openmrs.org/openmrs/spa
    steps:
      - name: Deploy via scoped SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -t ed25519 ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=yes \
            deploy@${{ secrets.SERVER_HOST }} \
            "/opt/deploy.sh emr-3-dev --no-health-check"
