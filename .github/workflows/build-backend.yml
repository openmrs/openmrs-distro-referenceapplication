name: Build Backend

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
      - 'docker-compose.yml'
      - 'pom.xml'
      - 'distro/**'
  workflow_dispatch:
    inputs:
      docker_image_tag:
        description: 'Docker image tag (e.g., nightly)'
        required: false
        default: 'nightly'
      docker_image_tag_version:
        description: 'Docker image version tag (e.g., 3.6.x)'
        required: false
        default: '3.6.x'
      docker_image_tag_env:
        description: 'Docker image environment tag (e.g., dev3)'
        required: false
        default: 'dev3'

env:
  IMAGE: openmrs/openmrs-reference-application-3-backend
  DOCKER_IMAGE_TAG: ${{ github.event.inputs.docker_image_tag || 'nightly' }}
  DOCKER_IMAGE_TAG_VERSION: ${{ github.event.inputs.docker_image_tag_version || '3.6.x' }}
  DOCKER_IMAGE_TAG_ENV: ${{ github.event.inputs.docker_image_tag_env || 'dev3' }}
  DOCKER_IMAGE_PLATFORMS: linux/amd64,linux/arm64

jobs:
  build-and-publish:
    name: Build and Publish the Backend Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Create Maven settings.xml
        run: echo "$MAVEN_SETTINGS_XML" > /tmp/maven-settings.xml
        env:
          MAVEN_SETTINGS_XML: ${{ secrets.MAVEN_SETTINGS_XML }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: ${{ env.DOCKER_IMAGE_PLATFORMS }}
          build-args: |
            MVN_COMMAND=deploy
            CACHE_BUST=${{ github.run_id }}
          secrets: |
            m2settings=/tmp/maven-settings.xml
          tags: |
            ${{ env.IMAGE }}:${{ env.DOCKER_IMAGE_TAG }}
            ${{ env.IMAGE }}:${{ env.DOCKER_IMAGE_TAG_VERSION }}
            ${{ env.IMAGE }}:${{ env.DOCKER_IMAGE_TAG_ENV }}

  build-and-publish-no-demo:
    name: Build and Publish the Backend Image Without Demo Content
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Create Maven settings.xml
        run: echo "$MAVEN_SETTINGS_XML" > /tmp/maven-settings.xml
        env:
          MAVEN_SETTINGS_XML: ${{ secrets.MAVEN_SETTINGS_XML }}

      - name: Build and push Docker image (no demo content)
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: ${{ env.DOCKER_IMAGE_PLATFORMS }}
          build-args: |
            MVN_COMMAND=-Pno-demo install
            CACHE_BUST=${{ github.run_id }}
          secrets: |
            m2settings=/tmp/maven-settings.xml
          tags: |
            ${{ env.IMAGE }}:${{ env.DOCKER_IMAGE_TAG }}-no-demo
            ${{ env.IMAGE }}:${{ env.DOCKER_IMAGE_TAG_VERSION }}-no-demo
