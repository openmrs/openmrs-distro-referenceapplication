name: Build Backend

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
      - 'docker-compose.yml'
      - 'pom.xml'
      - 'distro/**'
  workflow_dispatch:
    inputs:
      docker_image_tag:
        description: 'Docker image tag (e.g., nightly)'
        required: false
        default: 'nightly'
      docker_image_tag_version:
        description: 'Docker image version tag (e.g., 3.7.x)'
        required: false
        default: '3.7.x'
      docker_image_tag_env:
        description: 'Docker image environment tag (e.g., dev3)'
        required: false
        default: 'dev3'

env:
  IMAGE: openmrs/openmrs-reference-application-3-backend
  DOCKER_IMAGE_TAG: ${{ github.event.inputs.docker_image_tag || 'nightly' }}
  DOCKER_IMAGE_TAG_VERSION: ${{ github.event.inputs.docker_image_tag_version || '3.7.x' }}
  DOCKER_IMAGE_TAG_ENV: ${{ github.event.inputs.docker_image_tag_env || 'dev3' }}
  DOCKER_IMAGE_PLATFORMS: linux/amd64,linux/arm64

jobs:
  build-and-publish:
    name: Build and Publish the Backend Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Create Maven settings.xml
        run: |
          cat > /tmp/maven-settings.xml << EOF
          <settings xmlns="http://maven.apache.org/SETTINGS/1.0.0"
            xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
            xsi:schemaLocation="http://maven.apache.org/SETTINGS/1.0.0 https://maven.apache.org/xsd/settings-1.0.0.xsd">
            <servers>
              <server>
                <id>openmrs-repo-releases</id>
                <username>${MAVEN_REPO_USERNAME}</username>
                <password>${MAVEN_REPO_API_KEY}</password>
              </server>
              <server>
                <id>openmrs-repo-snapshots</id>
                <username>${MAVEN_REPO_USERNAME}</username>
                <password>${MAVEN_REPO_API_KEY}</password>
              </server>
            </servers>
          </settings>
          EOF
        env:
          MAVEN_REPO_USERNAME: ${{ secrets.MAVEN_REPO_USERNAME }}
          MAVEN_REPO_API_KEY: ${{ secrets.MAVEN_REPO_API_KEY }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: ${{ env.DOCKER_IMAGE_PLATFORMS }}
          build-args: |
            MVN_COMMAND=deploy
            CACHE_BUST=${{ github.run_id }}
          secret-files: |
            m2settings=/tmp/maven-settings.xml
          tags: |
            ${{ env.IMAGE }}:${{ env.DOCKER_IMAGE_TAG }}
            ${{ env.IMAGE }}:${{ env.DOCKER_IMAGE_TAG_VERSION }}
            ${{ env.IMAGE }}:${{ env.DOCKER_IMAGE_TAG_ENV }}

  build-and-publish-no-demo:
    name: Build and Publish the Backend Image Without Demo Content
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Create Maven settings.xml
        run: |
          cat > /tmp/maven-settings.xml << EOF
          <settings xmlns="http://maven.apache.org/SETTINGS/1.0.0"
            xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
            xsi:schemaLocation="http://maven.apache.org/SETTINGS/1.0.0 https://maven.apache.org/xsd/settings-1.0.0.xsd">
            <servers>
              <server>
                <id>openmrs-repo-releases</id>
                <username>${MAVEN_REPO_USERNAME}</username>
                <password>${MAVEN_REPO_API_KEY}</password>
              </server>
              <server>
                <id>openmrs-repo-snapshots</id>
                <username>${MAVEN_REPO_USERNAME}</username>
                <password>${MAVEN_REPO_API_KEY}</password>
              </server>
            </servers>
          </settings>
          EOF
        env:
          MAVEN_REPO_USERNAME: ${{ secrets.MAVEN_REPO_USERNAME }}
          MAVEN_REPO_API_KEY: ${{ secrets.MAVEN_REPO_API_KEY }}

      - name: Build and push Docker image (no demo content)
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: ${{ env.DOCKER_IMAGE_PLATFORMS }}
          build-args: |
            MVN_COMMAND=-Pno-demo install
            CACHE_BUST=${{ github.run_id }}
          secret-files: |
            m2settings=/tmp/maven-settings.xml
          tags: |
            ${{ env.IMAGE }}:${{ env.DOCKER_IMAGE_TAG }}-no-demo
            ${{ env.IMAGE }}:${{ env.DOCKER_IMAGE_TAG_VERSION }}-no-demo