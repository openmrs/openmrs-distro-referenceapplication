# Grafana Dashboards Provisioning for SIHSALUS
apiVersion: 1

providers:
  - name: 'SIHSALUS Dashboards'
    orgId: 1
    folder: 'SIHSALUS'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: true
