# Prometheus Configuration for SIHSALUS
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'sihsalus-production'
    environment: 'docker'

# Load rules once and periodically evaluate them
rule_files:
  - "/etc/prometheus/alerts/*.yml"

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: 'prometheus'

  # Blackbox HTTP endpoint probes
  - job_name: 'blackbox-http-prod'
    metrics_path: /probe
    params:
      module: [ http_2xx_ignore_ssl ]
    static_configs:
      - targets:
          - "http://gateway:80/"
          - "http://gateway:80/openmrs"
          - "http://gateway:80/openmrs/ws/rest/v1/session"
    relabel_configs:
      - source_labels: [ __address__ ]
        target_label: __param_target
      - source_labels: [ __param_target ]
        target_label: instance
      - target_label: __address__
        replacement: blackbox:9115

  # Grafana metrics
  - job_name: 'grafana'
    static_configs:
      - targets: ['grafana:3000']
        labels:
          service: 'grafana'

  # Loki metrics
  - job_name: 'loki'
    static_configs:
      - targets: ['loki:3100']
        labels:
          service: 'loki'

  # OpenMRS Backend metrics (JMX exporter - requires configuration)
  # - job_name: 'openmrs-backend'
  #   metrics_path: '/openmrs/metrics'
  #   static_configs:
  #     - targets: ['backend:8080']

  # MariaDB Exporter (if configured)
  # - job_name: 'mariadb-master'
  #   static_configs:
  #     - targets: ['mariadb-exporter:9104']

  # Keycloak metrics
  # - job_name: 'keycloak'
  #   metrics_path: '/metrics'
  #   static_configs:
  #     - targets: ['keycloak:8080']
