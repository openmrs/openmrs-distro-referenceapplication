# ===========================================
# peruHCE - DOCKER COMPOSE
# ===========================================
#
# USAGE:
#   docker compose up -d                                        # Core (gateway, frontend, backend, db)
#   docker compose --profile fua up -d                          # + FUA Generator
#   docker compose --profile hapi up -d                         # + HAPI FHIR Server
#   docker compose --profile imaging up -d                      # + Medical Imaging (OHIF/Orthanc)
#   docker compose --profile keycloak up -d                     # + Keycloak Auth
#   docker compose --profile monitoring up -d                   # + Observability (Grafana/Prometheus/Loki)
#   docker compose --profile fua --profile hapi up -d           # Combine profiles
#
# SSL/HTTPS (override adicional):
#   docker compose -f docker-compose.yml -f compose/ssl.yml --profile ssl up -d
#
# BUILD (con Docker Bake):
#   docker buildx bake                    # Build core images (backend, gateway, frontend)
#   docker buildx bake all                # Build all targets (+ keycloak, certbot)
#
# CI/TESTING (sin volumenes):
#   docker compose -f docker-compose-no-volumes.yml up -d

include:
  - path: compose/core.yml
    project_directory: .
  - path: compose/fua.yml
    project_directory: .
  - path: compose/hapi.yml
    project_directory: .
  - path: compose/imaging.yml
    project_directory: .
  - path: compose/keycloak.yml
    project_directory: .
  - path: compose/monitoring.yml
    project_directory: .

volumes:
  # Core
  openmrs-data:
  db-data:
  db-backup:
  # FUA (profile: fua)
  db-fua-generator:
  # HAPI FHIR (profile: hapi)
  hapi_pgdata:
  # Imaging (profile: imaging)
  orthanc-data:
    name: peruHCE-orthanc-data
  # Keycloak (profile: keycloak)
  keycloak-data:
    name: peruHCE-keycloak-data
  # Monitoring (profile: monitoring)
  prometheus-data:
    name: peruHCE-prometheus-data
  loki-data:
    name: peruHCE-loki-data
  alloy-data:
    name: peruHCE-alloy-data
  grafana-data:
    name: peruHCE-grafana-data

networks:
  # Red principal - servicios core
  default:
    driver: bridge
  # Red de servicios auxiliares (FUA, inter-service)
  services-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.27.0.0/24
  # Red medica - DICOM/Orthanc/OHIF
  dicom-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.24.0.0/24
  # Red de autenticacion - Keycloak
  auth-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.23.0.0/24
  # Red de monitoreo - Prometheus, Loki, Grafana
  monitoring-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.25.0.0/24
  # Red de gestion - Grafana admin
  management-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.26.0.0/24
