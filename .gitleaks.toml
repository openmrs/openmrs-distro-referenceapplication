[allowlist]
description = "Allow OpenMRS demo defaults and documentation examples"
paths = [
  '''README\.md$''',
  '''docker-compose.*\.yml$''',
  '''tests/.*''',
  '''openmrs-webhook-module/README\.md$'''
]
regexes = [
  '''openmrs''',
  '''admin@example\.com''',
  '''your-domain\.com''',
  '''example\.com'''
]
